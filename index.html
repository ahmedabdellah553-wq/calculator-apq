<!DOCTYPE html>
<html>
    <head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="style.css">       
    </head>
    <body>
<input type="text" id="display" disabled value="">

<div class="buttons">
      <button onclick="addToDisplay"('Math.sin')">sin</button>
    <button onclick="addToDisplay('Math.cos(')">cos</button>
    <button onclick="addToDisplay('Math.tan(')">tan</button>
    <button onclick="appendValue('*')">×</button>
    
      <button onclick="appendValue('^')">xʸ</button>
      <button onclick="appendValue('²')">x²</button>
    <button
      <button onclick="addToDisplay('Math.PI')">π</button>
    <button onclick="appendValue('-')">-</button>
    
    <button onclick="toggleSD()">S-D</button>
    <button onclick="appendValue('(')">(</button>
    <button onclick="appendValue(')')">)</button>
    <button onclick="appendValue('+')">+</button>
    
        <button onclick="clearDisplay()">AC</button>
    <button onclick="appendValue('%')">%</button>
    <button onclick="appendValue('.')">.</button>
     <button onclick="appendValue('/')">÷</button>
    
    <button onclick="appendValue('7')">7</button>
     <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
<button onclick="toggleSign()">±</button>
 <button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('√(')">√</button>
    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
    <button onclick="deleteLast()">DEL</button>
  <button onclick="appendValue('0')">0</button>
  <button onclick="useAns()">ANS</button>
<button onclick="calculate()" style="grid-column: span 2">=</button>
  </div>
  <script src="script.js"></script>
</body>
      </html>
